<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Primmobilier — Atlas du marché</title>
    <meta name="theme-color" content="#0a0d12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.14.0/dist/maplibre-gl.css">
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <main class="app">
      <section id="estimationPanel" class="panel" aria-label="Estimation immobilière">
        <div class="brand">
          <strong><span class="brand-dot" aria-hidden="true"></span>Primmobilier</strong>
          <div class="head-actions">
            <span>Atlas DVF</span>
            <button id="themeToggle" class="theme-toggle" type="button" aria-label="Basculer le thème">
              <svg class="icon-sun" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
                <circle cx="12" cy="12" r="4.2"/>
                <path d="M12 2.5v2.4M12 19.1v2.4M2.5 12h2.4M19.1 12h2.4M5.2 5.2l1.7 1.7M17.1 17.1l1.7 1.7M18.8 5.2l-1.7 1.7M6.9 17.1l-1.7 1.7"/>
              </svg>
              <svg class="icon-moon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20.5 14.5A8.5 8.5 0 1 1 9.5 3.5a7 7 0 0 0 11 11z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="mode-control" aria-label="Mode">
          <button type="button" data-mode="estimation" class="active">Estimation</button>
          <button type="button" data-mode="exploration">Exploration</button>
        </div>

        <div class="search-wrap">
          <label class="field search-field">
            <span id="addressLabel">Adresse</span>
            <input id="address" autocomplete="off" placeholder="12 cours de l'Intendance, Bordeaux">
          </label>
          <div id="suggestions" class="suggestions" hidden></div>
        </div>

        <div id="estimationFields" class="grid">
          <label class="field">
            <span>Type</span>
            <select id="type">
              <option>Appartement</option>
              <option>Maison</option>
            </select>
          </label>
          <label class="field">
            <span>Surface</span>
            <input id="surface" type="number" min="10" step="1" value="65">
          </label>
          <label class="field">
            <span>Pièces</span>
            <input id="rooms" type="number" min="1" step="1" value="3">
          </label>
          <label class="field">
            <span>Prix soumis</span>
            <input id="askedPrice" type="number" min="0" step="1000" placeholder="optionnel">
          </label>
        </div>

        <div id="explorationFilters" class="grid" aria-label="Filtres d'exploration" hidden>
          <div class="field layer-select layer-menu type-menu" id="marketTypeMenu">
            <span>Type</span>
            <div class="layer-menu-trigger">
              <button type="button" class="layer-menu-current">
                <span id="marketTypeLabel">Tous</span>
                <span class="layer-menu-caret">▾</span>
              </button>
              <div class="layer-menu-providers">
                <button type="button" data-market-type="" class="active">Tous</button>
                <button type="button" data-market-type="Maison">Maison</button>
                <button type="button" data-market-type="Appartement">Appartement</button>
                <button type="button" data-market-type="Terrain">Terrain</button>
                <button type="button" data-market-type="Dépendance">Dépendance</button>
                <button type="button" data-market-type="Local">Local</button>
              </div>
            </div>
          </div>
        </div>

        <div class="section-label">Emprise</div>
        <div class="scope-control" aria-label="Emprise de comparaison">
          <button type="button" data-scope="radius" class="active">Rayon</button>
          <button type="button" data-scope="cadastre">Section</button>
          <button type="button" data-scope="postcode">Code postal</button>
          <button type="button" data-scope="city">Commune</button>
        </div>

        <label class="zone-toggle">
          <input type="checkbox" id="zoneToggle" checked>
          <span class="switch" aria-hidden="true"></span>
          <span>Afficher la zone sur la carte</span>
        </label>

        <div id="radiusControl" class="radius-control slider-radius">
          <div class="radius-head">
            <span>Rayon</span>
            <strong id="radiusLabel">1,5 km</strong>
          </div>
          <input id="radiusSlider" type="range" min="0" max="13" step="1" value="7" aria-label="Rayon de comparaison">
          <div class="radius-scale" aria-hidden="true">
            <span>100 m</span>
            <span>20 km</span>
          </div>
        </div>

        <div class="history-control slider-history">
          <div class="radius-head">
            <span>Historique</span>
            <strong id="historyLabel">0 – 5 ans</strong>
          </div>
          <div class="dual-range">
            <input id="historyMin" type="range" min="0" max="5" step="1" value="0" aria-label="Âge minimum des ventes">
            <input id="historyMax" type="range" min="0" max="5" step="1" value="5" aria-label="Âge maximum des ventes">
          </div>
          <div class="radius-scale" aria-hidden="true">
            <span>0</span>
            <span>5 ans</span>
          </div>
        </div>

        <div id="priceControl" class="radius-control slider-price" hidden>
          <div class="radius-head">
            <span>Prix</span>
            <strong id="priceLabel">Tous</strong>
          </div>
          <div class="dual-range">
            <input id="priceMin" type="range" min="0" max="1000000" step="10000" value="0" aria-label="Prix minimum">
            <input id="priceMax" type="range" min="0" max="1000000" step="10000" value="1000000" aria-label="Prix maximum">
          </div>
          <div class="radius-scale" aria-hidden="true">
            <span id="priceScaleMin">0 €</span>
            <span id="priceScaleMax">1 M€</span>
          </div>
        </div>

        <div id="surfaceControl" class="radius-control slider-surface" hidden>
          <div class="radius-head">
            <span>Surface</span>
            <strong id="surfaceLabel">Toutes</strong>
          </div>
          <div class="dual-range">
            <input id="surfaceMin" type="range" min="0" max="300" step="1" value="0" aria-label="Surface minimum">
            <input id="surfaceMax" type="range" min="0" max="300" step="1" value="300" aria-label="Surface maximum">
          </div>
          <div class="radius-scale" aria-hidden="true">
            <span id="surfaceScaleMin">0 m²</span>
            <span id="surfaceScaleMax">300 m²</span>
          </div>
        </div>

        <div id="roomsControl" class="radius-control slider-rooms" hidden>
          <div class="radius-head">
            <span>Pièces</span>
            <strong id="roomsLabel">Non applicable</strong>
          </div>
          <div class="dual-range">
            <input id="roomsMin" type="range" min="1" max="8" step="1" value="1" aria-label="Nombre de pièces minimum">
            <input id="roomsMax" type="range" min="1" max="8" step="1" value="8" aria-label="Nombre de pièces maximum">
          </div>
          <div class="radius-scale" aria-hidden="true">
            <span id="roomsScaleMin">1</span>
            <span id="roomsScaleMax">8+</span>
          </div>
        </div>

        <div class="toolbar">
          <button id="estimate" type="button">Estimer</button>
          <button id="reset" type="button">Reset</button>
        </div>

        <div class="map-controls" aria-label="Contrôles de carte">
          <div class="layer-select layer-menu" id="baseLayerMenu">
            <span>Fond de carte</span>
            <div class="layer-menu-trigger">
              <button type="button" class="layer-menu-current">
                <span id="baseLayerLabel">Dark Matter</span>
                <span class="layer-menu-caret">▾</span>
              </button>
              <div class="layer-menu-providers">
                <div class="layer-provider">
                  <button type="button" class="layer-provider-name">CARTO<span class="layer-menu-caret">›</span></button>
                  <div class="layer-submenu">
                    <button type="button" data-layer="cartodark" class="active">Dark Matter</button>
                    <button type="button" data-layer="carto">Positron</button>
                    <button type="button" data-layer="voyager">Voyager</button>
                  </div>
                </div>
                <div class="layer-provider">
                  <button type="button" class="layer-provider-name">IGN<span class="layer-menu-caret">›</span></button>
                  <div class="layer-submenu">
                    <button type="button" data-layer="ignplan">IGN Plan</button>
                    <button type="button" data-layer="ign">IGN Satellite</button>
                  </div>
                </div>
                <div class="layer-provider">
                  <button type="button" class="layer-provider-name">OSM<span class="layer-menu-caret">›</span></button>
                  <div class="layer-submenu">
                    <button type="button" data-layer="osm">OSM standard</button>
                  </div>
                </div>
                <div class="layer-provider">
                  <button type="button" class="layer-provider-name">Stadia<span class="layer-menu-caret">›</span></button>
                  <div class="layer-submenu">
                    <button type="button" data-layer="stadiasat">Stadia Satellite</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="layer-select layer-menu" id="cadastreMenu">
            <span>Grille cadastre</span>
            <div class="layer-menu-trigger">
              <button type="button" class="layer-menu-current">
                <span id="cadastreLabel">Masquée</span>
                <span class="layer-menu-caret">▾</span>
              </button>
              <div class="layer-menu-providers">
                <button type="button" data-cadastre="none" class="active">Masquée</button>
                <button type="button" data-cadastre="biens">Biens affichés</button>
                <button type="button" data-cadastre="all">Tout (zoom ≥ 15)</button>
              </div>
            </div>
          </div>
        </div>

        <div id="status" class="status"></div>

        <section id="result" class="result" hidden>
          <div>
            <span class="label">Prix médian estimé</span>
            <strong id="estimatedPrice"></strong>
          </div>
          <div class="metrics">
            <span><b id="medianM2"></b> €/m²</span>
            <span><button id="salesChip" class="scope-chip sales-chip" type="button" aria-expanded="true"><b id="count"></b> ventes</button></span>
            <span><button id="scope" class="scope-chip" type="button"></button></span>
          </div>
          <div id="scopeDetails" class="scope-details" hidden></div>
          <div id="estimationStats" class="result-stats">
            <div id="range" class="range"></div>
            <div id="askedPosition" class="range"></div>
          </div>
        </section>

        <section id="marketResult" class="result" hidden>
          <div class="metrics">
            <span><button id="marketSalesChip" class="scope-chip sales-chip" type="button" aria-expanded="true"><b id="marketCount"></b> ventes</button></span>
            <span><button id="marketScope" class="scope-chip" type="button"></button></span>
          </div>
          <div id="marketScopeDetails" class="scope-details" hidden></div>
          <div id="marketStats" class="market-stats"></div>
        </section>
      </section>
      <button id="expandEstimation" class="expand-estimation" type="button" aria-label="Ouvrir la recherche">›</button>

      <div id="map"></div>

      <div id="timeline" class="timeline" hidden aria-label="Frise temporelle du marché">
        <button id="timelinePlay" class="timeline-play" type="button" aria-label="Lecture">
          <svg class="icon-play" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M7 4.8c0-1 1.1-1.6 1.9-1.1l11 6.7c.8.5.8 1.7 0 2.2l-11 6.7c-.8.5-1.9-.1-1.9-1.1z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><rect x="5.5" y="4" width="4.4" height="16" rx="1.4"/><rect x="14.1" y="4" width="4.4" height="16" rx="1.4"/></svg>
        </button>
        <div class="timeline-track">
          <canvas id="timelineCanvas" class="timeline-canvas" aria-hidden="true"></canvas>
          <input id="timelineScrub" type="range" min="0" max="0" step="1" value="0" aria-label="Période affichée">
        </div>
        <div class="timeline-meta">
          <strong id="timelineWindow">—</strong>
          <span id="timelineTicker"></span>
        </div>
        <button id="timelineAll" class="timeline-all" type="button" hidden>Tout</button>
      </div>

      <aside class="table-wrap collapsed" aria-label="Résultats">
        <div id="comparableDetail" class="detail-panel" hidden>
          <div class="table-head">
            <strong>Détail</strong>
            <button id="closeDetail" type="button" aria-label="Fermer">×</button>
          </div>
          <div id="detailBody" class="detail-body"></div>
        </div>
        <div class="list-panel">
          <div class="table-head">
            <strong>Résultats</strong>
            <div class="head-actions">
              <div class="sort-menu">
                <button id="sortToggle" type="button" aria-expanded="false">Trier</button>
                <div id="sortOptions" class="sort-options">
                  <button type="button" data-sort="similarity">Similarité</button>
                  <button type="button" data-sort="price">Prix</button>
                  <button type="button" data-sort="date">Date</button>
                  <button type="button" data-sort="surface">m²</button>
                </div>
              </div>
              <span id="tableMeta">Aucun calcul</span>
            </div>
          </div>
          <div id="comparablesList" class="comparables-list"></div>
        </div>
        <button id="expandComparables" class="expand-comparables" type="button" aria-label="Ouvrir les résultats">‹</button>
      </aside>
    </main>

    <script src="https://unpkg.com/maplibre-gl@5.14.0/dist/maplibre-gl.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
