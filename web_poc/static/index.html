<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Primmobilier POC</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.14.0/dist/maplibre-gl.css">
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <main class="app">
      <section id="estimationPanel" class="panel" aria-label="Estimation immobilière">
        <div class="brand">
          <strong>Primmobilier</strong>
          <div class="head-actions">
            <span>POC comparables DVF</span>
            <button id="toggleEstimation" type="button" aria-label="Réduire">−</button>
          </div>
        </div>

        <div class="mode-control" aria-label="Mode">
          <button type="button" data-mode="estimation" class="active">Estimation</button>
          <button type="button" data-mode="exploration">Exploration</button>
        </div>

        <div class="search-wrap">
          <label class="field search-field">
            <span id="addressLabel">Adresse</span>
            <input id="address" autocomplete="off" placeholder="12 cours de l'Intendance, Bordeaux">
          </label>
          <div id="suggestions" class="suggestions" hidden></div>
        </div>

        <div id="estimationFields" class="grid">
          <label class="field">
            <span>Type</span>
            <select id="type">
              <option>Appartement</option>
              <option>Maison</option>
            </select>
          </label>
          <label class="field">
            <span>Surface</span>
            <input id="surface" type="number" min="10" step="1" value="65">
          </label>
          <label class="field">
            <span>Pièces</span>
            <input id="rooms" type="number" min="1" step="1" value="3">
          </label>
          <label class="field">
            <span>Prix soumis</span>
            <input id="askedPrice" type="number" min="0" step="1000" placeholder="optionnel">
          </label>
        </div>

        <div class="history-control">
          <div class="radius-head">
            <span>Historique</span>
            <strong id="historyLabel">0 – 5 ans</strong>
          </div>
          <div class="dual-range">
            <input id="historyMin" type="range" min="0" max="5" step="1" value="0" aria-label="Âge minimum des ventes">
            <input id="historyMax" type="range" min="0" max="5" step="1" value="5" aria-label="Âge maximum des ventes">
          </div>
          <div class="radius-scale" aria-hidden="true">
            <span>0</span>
            <span>5 ans</span>
          </div>
        </div>

        <div id="priceControl" class="radius-control" hidden>
          <div class="radius-head">
            <span>Prix</span>
            <strong id="priceLabel">Tous</strong>
          </div>
          <div class="dual-range">
            <input id="priceMin" type="range" min="0" max="1000000" step="10000" value="0" aria-label="Prix minimum">
            <input id="priceMax" type="range" min="0" max="1000000" step="10000" value="1000000" aria-label="Prix maximum">
          </div>
          <div class="radius-scale" aria-hidden="true">
            <span id="priceScaleMin">0 €</span>
            <span id="priceScaleMax">1 M€</span>
          </div>
        </div>

        <div class="scope-control" aria-label="Emprise de comparaison">
          <button type="button" data-scope="radius" class="active">Rayon</button>
          <button type="button" data-scope="cadastre">Section</button>
          <button type="button" data-scope="postcode">Code postal</button>
          <button type="button" data-scope="city">Commune</button>
        </div>

        <label class="zone-toggle">
          <input type="checkbox" id="zoneToggle" checked>
          <span>Afficher la zone sur la carte</span>
        </label>

        <div id="radiusControl" class="radius-control">
          <div class="radius-head">
            <span>Rayon</span>
            <strong id="radiusLabel">1,5 km</strong>
          </div>
          <input id="radiusSlider" type="range" min="0" max="13" step="1" value="7" aria-label="Rayon de comparaison">
          <div class="radius-scale" aria-hidden="true">
            <span>100 m</span>
            <span>20 km</span>
          </div>
        </div>

        <div id="explorationFilters" class="type-chips" aria-label="Types de biens" hidden>
          <button type="button" data-cat="all" class="active">Tous</button>
          <button type="button" data-cat="Maison">Maison</button>
          <button type="button" data-cat="Appartement">Appart.</button>
          <button type="button" data-cat="Terrain">Terrain</button>
          <button type="button" data-cat="Dépendance">Dépend.</button>
          <button type="button" data-cat="Local">Local</button>
        </div>

        <div class="toolbar">
          <button id="estimate" type="button">Estimer</button>
          <button id="reset" type="button">Reset</button>
        </div>

        <div id="status" class="status">Sélectionne une adresse en Gironde ou Lot-et-Garonne.</div>
        <div id="targetStreetView" class="street-status" hidden></div>

        <section id="result" class="result" hidden>
          <div>
            <span class="label">Prix médian estimé</span>
            <strong id="estimatedPrice"></strong>
          </div>
          <div class="metrics">
            <span><b id="medianM2"></b> €/m²</span>
            <span><b id="count"></b> ventes</span>
            <span><b id="scope"></b></span>
          </div>
          <div id="range" class="range"></div>
          <div id="askedPosition" class="range"></div>
        </section>

        <section id="marketResult" class="result" hidden>
          <div class="metrics">
            <span><b id="marketCount"></b> ventes</span>
            <span><b id="marketScope"></b></span>
          </div>
          <div id="marketStats" class="market-stats"></div>
        </section>
      </section>
      <button id="expandEstimation" class="expand-estimation" type="button">Estimation</button>

      <div id="map"></div>

      <aside class="map-controls" aria-label="Contrôles de carte">
        <div class="layer-select layer-menu" id="baseLayerMenu">
          <span>Fond de carte</span>
          <div class="layer-menu-trigger">
            <button type="button" class="layer-menu-current">
              <span id="baseLayerLabel">IGN Plan</span>
              <span class="layer-menu-caret">▾</span>
            </button>
            <div class="layer-menu-providers">
              <div class="layer-provider">
                <button type="button" class="layer-provider-name">IGN<span class="layer-menu-caret">‹</span></button>
                <div class="layer-submenu">
                  <button type="button" data-layer="ignplan" class="active">IGN Plan</button>
                  <button type="button" data-layer="ign">IGN Satellite</button>
                </div>
              </div>
              <div class="layer-provider">
                <button type="button" class="layer-provider-name">CARTO<span class="layer-menu-caret">‹</span></button>
                <div class="layer-submenu">
                  <button type="button" data-layer="carto">Positron</button>
                  <button type="button" data-layer="voyager">Voyager</button>
                </div>
              </div>
              <div class="layer-provider">
                <button type="button" class="layer-provider-name">OSM<span class="layer-menu-caret">‹</span></button>
                <div class="layer-submenu">
                  <button type="button" data-layer="osm">OSM standard</button>
                </div>
              </div>
              <div class="layer-provider">
                <button type="button" class="layer-provider-name">Stadia<span class="layer-menu-caret">‹</span></button>
                <div class="layer-submenu">
                  <button type="button" data-layer="stadiasat">Stadia Satellite</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="layer-select layer-menu" id="cadastreMenu">
          <span>Grille cadastre</span>
          <div class="layer-menu-trigger">
            <button type="button" class="layer-menu-current">
              <span id="cadastreLabel">Masqué</span>
              <span class="layer-menu-caret">▾</span>
            </button>
            <div class="layer-menu-providers">
              <button type="button" data-cadastre="none" class="active">Masqué</button>
              <button type="button" data-cadastre="biens">Biens affichés</button>
              <button type="button" data-cadastre="all">Tout (zoom ≥ 15)</button>
            </div>
          </div>
        </div>
      </aside>

      <aside id="streetViewPanel" class="street-panel" hidden aria-label="Vue rue">
        <div class="table-head">
          <strong>Vue rue</strong>
          <button id="closeStreetView" type="button" aria-label="Fermer">×</button>
        </div>
        <div id="streetViewBody" class="street-body"></div>
      </aside>

      <aside class="table-wrap collapsed" aria-label="Comparables retenus">
        <div id="comparableDetail" class="detail-panel" hidden>
          <div class="table-head">
            <strong>Détail</strong>
            <button id="closeDetail" type="button" aria-label="Fermer">×</button>
          </div>
          <div id="detailBody" class="detail-body"></div>
        </div>
        <div class="list-panel">
          <div class="table-head">
            <strong>Comparables</strong>
            <div class="head-actions">
              <label id="limitControl" class="limit-control" title="Nombre maximum de comparables affichés">
                Max
                <input id="maxComparables" type="number" min="5" max="1000" step="5" value="200">
              </label>
              <div class="sort-menu">
                <button id="sortToggle" type="button" aria-expanded="false">Trier</button>
                <div id="sortOptions" class="sort-options">
                  <button type="button" data-sort="similarity">Similarité</button>
                  <button type="button" data-sort="price">Prix</button>
                  <button type="button" data-sort="date">Date</button>
                  <button type="button" data-sort="surface">m²</button>
                </div>
              </div>
              <span id="tableMeta">Aucun calcul</span>
              <button id="toggleComparables" type="button" aria-label="Réduire">−</button>
            </div>
          </div>
          <div id="comparablesList" class="comparables-list"></div>
        </div>
        <button id="expandComparables" class="expand-comparables" type="button">Comparables</button>
      </aside>
    </main>

    <script src="https://unpkg.com/maplibre-gl@5.14.0/dist/maplibre-gl.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
